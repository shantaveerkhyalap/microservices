name: Microservices CI/CD Pipeline

on:
  push:
    branches: [main, appu]
    paths-ignore:
      - 'k8s/services.yaml'
  pull_request:
    branches: [appu, main]
    paths-ignore:
      - 'k8s/services.yaml'

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: ${{ secrets.DOCKER_USERNAME }}

jobs:
  # ─── CI: Lint & Test ─────────────────────────────────────────────
  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [api-gateway, user-service, product-service, order-service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: "**/package-lock.json"

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: |
          if [ -f package-lock.json ]; then
            echo "Lock file found → running npm ci"
            npm ci
          else
            echo "No lock file → running npm install"
            npm install
          fi

      - name: Run linter
        working-directory: ${{ matrix.service }}
        run: npm run lint --if-present

      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: npm test --if-present

  # ─── Build & Push Docker Images ─────────────────────────────────
  build:
    name: Build & Scan ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read

    strategy:
      matrix:
        service: [api-gateway, user-service, product-service, order-service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=

      - name: Build Docker image (local for scanning)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          load: true

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ steps.meta.outputs.version }}
          format: table
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy to Kubernetes (GitOps style) ────────────────────────
  deploy:
    name: Update K8s Deployment
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}

      - name: Setup Git config
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Update Kubernetes k8s/services.yaml
        run: |
          SHA_TAG="${{ github.sha }}"
          TARGET_FILE="k8s/services.yaml"

          echo "Updating $TARGET_FILE with new images for commit $SHA_TAG"

          for service in api-gateway user-service product-service order-service; do
            IMAGE_NAME="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${service}:${SHA_TAG}"
            echo "Updating $service → $IMAGE_NAME"
            sed -i "/name: ${service}/,/image:/ s|image: .*|image: ${IMAGE_NAME}|" "$TARGET_FILE"
          done

          echo "Done updating $TARGET_FILE"

      - name: Commit and push changes
        run: |
          git add k8s/services.yaml
          git commit -m "chore(k8s): update images to ${{ github.sha }}" || echo "No changes to commit"
          git push
