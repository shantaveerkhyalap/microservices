name: Microservices CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ─── CI: Lint & Test ─────────────────────────────────────────────
  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, user-service, product-service, order-service]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm ci

      - name: Run linter
        working-directory: ${{ matrix.service }}
        run: npm run lint --if-present

      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: npm test --if-present

  # ─── Build & Push Docker Images ─────────────────────────────────
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [api-gateway, user-service, product-service, order-service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy to Kubernetes ───────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      - name: Set Kubernetes context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Deploy infrastructure
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/config.yaml
          kubectl apply -f k8s/infrastructure.yaml

      - name: Wait for infrastructure
        run: |
          kubectl wait --for=condition=ready pod -l app=mongodb -n microservices --timeout=120s
          kubectl wait --for=condition=ready pod -l app=rabbitmq -n microservices --timeout=120s
          kubectl wait --for=condition=ready pod -l app=redis -n microservices --timeout=120s

      - name: Deploy services
        run: |
          kubectl apply -f k8s/services.yaml

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/api-gateway -n microservices --timeout=120s
          kubectl rollout status deployment/user-service -n microservices --timeout=120s
          kubectl rollout status deployment/product-service -n microservices --timeout=120s
          kubectl rollout status deployment/order-service -n microservices --timeout=120s

      - name: Show deployment status
        run: |
          echo "=== Pods ==="
          kubectl get pods -n microservices
          echo "=== Services ==="
          kubectl get svc -n microservices
          echo "=== HPA ==="
          kubectl get hpa -n microservices
