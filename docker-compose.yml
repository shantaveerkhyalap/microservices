version: "3.8"

services:
  # ─── Infrastructure ──────────────────────────────────────────────

  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - microservices-net
    restart: unless-stopped

  # ─── API Gateway ─────────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      USER_SERVICE_URL: http://user-service:3001
      PRODUCT_SERVICE_URL: http://product-service:3002
      ORDER_SERVICE_URL: http://order-service:3003
      JWT_SECRET: 7b9e1c2a4f6d8b0e3a5c7d9f1b2e4a6c8d0f2e4b6d8a0c2e4f6a8b
    depends_on:
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    networks:
      - microservices-net
    restart: unless-stopped

  # ─── User Service ───────────────────────────────────────────────
  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DB_NAME: users_db
      MONGO_URI: mongodb+srv://Microservices:bKYdqlaYFoBezdrs@cluster0.tx6by.mongodb.net
      RABBITMQ_URL: amqps://njzzrtsi:QMxQSYe7L4xzEvVHlfpeSpFrdl8WXnSC@campbell.lmq.cloudamqp.com/njzzrtsi
      JWT_SECRET: 7b9e1c2a4f6d8b0e3a5c7d9f1b2e4a6c8d0f2e4b6d8a0c2e4f6a8b
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - microservices-net
    restart: unless-stopped

  # ─── Product Service ────────────────────────────────────────────
  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    container_name: product-service
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      DB_NAME: products_db
      MONGO_URI: mongodb+srv://Microservices:bKYdqlaYFoBezdrs@cluster0.tx6by.mongodb.net
      RABBITMQ_URL: amqps://njzzrtsi:QMxQSYe7L4xzEvVHlfpeSpFrdl7WXnSC@campbell.lmq.cloudamqp.com/njzzrtsi
      JWT_SECRET: 7b9e1c2a4f6d8b0e3a5c7d9f1b2e4a6c8d0f2e4b6d8a0c2e4f6a8b
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - microservices-net
    restart: unless-stopped

  # ─── Order Service ──────────────────────────────────────────────
  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: order-service
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      DB_NAME: orders_db
      MONGO_URI: mongodb+srv://Microservices:bKYdqlaYFoBezdrs@cluster0.tx6by.mongodb.net
      RABBITMQ_URL: amqps://njzzrtsi:QMxQSYe7L4xzEvVHlfpeSpFrdl7WXnSC@campbell.lmq.cloudamqp.com/njzzrtsi
      JWT_SECRET: 7b9e1c2a4f6d8b0e3a5c7d9f1b2e4a6c8d0f2e4b6d8a0c2e4f6a8b
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - microservices-net
    restart: unless-stopped

# ─── Volumes ───────────────────────────────────────────────────────
volumes:
  mongodb_data:
    driver: local

# ─── Networks ──────────────────────────────────────────────────────
networks:
  microservices-net:
    driver: bridge
